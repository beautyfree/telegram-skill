name: CI

on:
  push:
    branches: [main, v2-tdlib]
  pull_request:
    branches: [main, v2-tdlib]

jobs:
  test:
    name: Bun on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (biome)
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun --filter '*' test

      - name: Verify CLI --version
        run: bun run apps/cli/src/index.ts --version

      - name: Verify CLI --help renders all categories
        run: |
          out=$(bun run apps/cli/src/index.ts --help)
          echo "$out"
          echo "$out" | grep -q "Saved Messages"
          echo "$out" | grep -q "Portable session"
          echo "$out" | grep -q "Identity"

      - name: Smoke `session export` returns NOT_FOUND on empty TG_APP_DIR
        env:
          TG_APP_DIR: /tmp/tg-empty-app-dir
        run: |
          mkdir -p /tmp/tg-empty-app-dir
          out=$(bun run apps/cli/src/index.ts session export || true)
          echo "$out"
          echo "$out" | grep -q '"code":"NOT_FOUND"'
